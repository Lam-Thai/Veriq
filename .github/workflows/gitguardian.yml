name: GitGuardian Secret Scan

on:
  pull_request:

# Cancel superseded runs on the same PR to avoid wasted/queued scans.
concurrency:
  group: gitguardian-${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  scanning:
    name: GitGuardian scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0 # fetch full history so the PR's commit range can be scanned
          persist-credentials: false

      - name: GitGuardian scan
        # Skip on forked PRs: GITGUARDIAN_API_KEY isn't available to workflows
        # triggered from a fork, so the step would only fail on a missing key.
        if: github.event.pull_request.head.repo.full_name == github.repository
        uses: GitGuardian/ggshield-action@da20be06cafe5e8633dc24744efe1efe8d30f06b # v1.52.2
        env:
          GITHUB_DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          GITGUARDIAN_API_KEY: ${{ secrets.GITGUARDIAN_API_KEY }}
